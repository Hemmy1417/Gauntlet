name: tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  # Reliable gates — no GenVM runtime needed. These should always be green.
  checks:
    name: direct tests + genvm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip pytest genvm-linter

      - name: Direct-mode tests (stubbed panel — pure logic)
        run: pytest tests/direct -q

      - name: Pre-fetch GenVM artifacts for the linter
        run: genvm-lint download

      - name: genvm-lint check (lint + semantic validate)
        run: genvm-lint check contracts/gauntlet.py --json

  # Real GenVM + full leader/validator consensus against StudioNet (gasless).
  # Local GLSim is a dead end for now: genlayer-test[sim] 0.29.2 fetches
  # `genvm-universal.tar.xz`, which the current genvm release doesn't publish
  # (any OS), so its runtime never provisions — confirmed failing on Ubuntu CI.
  # StudioNet runs the real GenVM directly with no runtime download.
  # Kept `continue-on-error` while we confirm StudioNet finalizes reliably here
  # (it has intermittent new-deploy indexing lag); drop the flag once green.
  integration:
    name: gltest integration (StudioNet)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip pytest genlayer-test

      - name: gltest integration on StudioNet (exclude slow real-LLM tests)
        run: gltest tests/integration -v -s --network studionet -m "not slow"
