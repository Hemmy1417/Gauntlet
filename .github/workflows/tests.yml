name: tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  # Reliable gates — no GenVM runtime needed. These should always be green.
  checks:
    name: direct tests + genvm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip pytest genvm-linter

      - name: Direct-mode tests (stubbed panel — pure logic)
        run: pytest tests/direct -q

      - name: Pre-fetch GenVM artifacts for the linter
        run: genvm-lint download

      - name: genvm-lint check (lint + semantic validate)
        run: genvm-lint check contracts/gauntlet.py --json

  # Real GenVM + full leader/validator consensus via local GLSim.
  # continue-on-error until the first Linux run confirms GLSim can provision the
  # GenVM runtime here (on Windows it 404s fetching genvm-universal.tar.xz, which
  # the release doesn't publish; Linux should pick genvm-linux-amd64 instead).
  # Once a run passes, delete the `continue-on-error` line to make it required.
  integration:
    name: gltest integration (GLSim)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (with GLSim)
        run: python -m pip install --upgrade pip pytest "genlayer-test[sim]"

      - name: Start GLSim (5 validators)
        run: |
          glsim --port 4000 --validators 5 --no-browser &
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:4000; then echo "GLSim up"; break; fi
            sleep 1
          done

      - name: gltest integration (exclude slow real-LLM tests)
        run: gltest tests/integration -v -s --network localnet -m "not slow"
